name: golangci-lint

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
    branches:
      - main
      - dev
      - "ver_*"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
    branches:
      - main
      - dev
      - "ver_*"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1

      - name: Lint Summary
        run: |
          echo "✅ golangci-lint completed successfully"
